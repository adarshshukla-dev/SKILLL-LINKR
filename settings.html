<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Client Panel</title>
  <link rel="stylesheet" href="dashboard-common.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <style>
    .settings-grid { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }
    .settings-nav { background: var(--white); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; height: fit-content; }
    .s-nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; color: var(--grey); transition: 0.3s; }
    .s-nav-item.active { background: var(--primary-light); color: var(--primary); }
    
    .settings-form { background: var(--white); padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border); }
    .form-section { margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem; }
    .form-section:last-child { border: none; }
    .form-section h3 { margin-bottom: 1.5rem; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
    
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); outline: none; background: var(--bg-body); font-family: inherit; }
    input:focus { border-color: var(--primary); }
    
    .danger-zone { border: 1px solid #fee2e2; background: #fffafb; padding: 1.5rem; border-radius: 15px; margin-top: 2rem; }
    
    @media (max-width: 900px) { .settings-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="logo"><h2><span>Skill</span> Linkr</h2></div>
    <nav class="sidebar-menu">
      <a href="client-dashboard.html" class="menu-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
      <a href="post-project.html" class="menu-item"><i class="fas fa-plus-circle"></i> Post a Project</a>
      <a href="my-projects.html" class="menu-item"><i class="fas fa-folder-open"></i> My Projects</a>
      <a href="freelancers.html" class="menu-item"><i class="fas fa-search"></i> Find Students</a>
      <a href="messages.html" class="menu-item"><i class="fas fa-comment-dots"></i> Messages <span class="badge">3</span></a>
      <a href="settings.html" class="menu-item active"><i class="fas fa-cog"></i> <span>Settings</span></a>
      <a href="index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div class="welcome-text"><h1 data-aos="fade-down">Account Settings ⚙️</h1><p>Update your company profile and security preferences.</p></div>
    </header>

    <div class="settings-grid">
      <div class="settings-nav" data-aos="fade-right">
        <div class="s-nav-item active"><i class="fas fa-user"></i> Profile Info</div>
        <div class="s-nav-item"><i class="fas fa-shield-alt"></i> Security</div>
        <div class="s-nav-item"><i class="fas fa-bell"></i> Notifications</div>
        <div class="s-nav-item"><i class="fas fa-credit-card"></i> Billing</div>
      </div>
