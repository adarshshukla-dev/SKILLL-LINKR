<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelancer Signup | Skill Linkr</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="auth-nav">
  <div class="logo"><h2><span>Skill</span> Linkr</h2></div>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Home</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon-circle"><i class="fas fa-user-graduate"></i></div>
      <h2>Student Registration</h2>
      <p>Start your freelancing journey today.</p>
    </div>

    <form>
      <div class="input-group">
        <label>Full Name</label>
        <div class="input-field">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="e.g. Adarsh Shukla" required>
        </div>
      </div>

      <div class="input-group">
        <label>College/University</label>
        <div class="input-field">
          <i class="fas fa-university"></i>
          <input type="text" placeholder="Where do you study?" required>
        </div>
      </div>

      <div class="input-group">
        <label>Major Skills</label>
        <div class="input-field">
          <i class="fas fa-laptop-code"></i>
          <input type="text" placeholder="Web, UI/UX, Content..." required>
        </div>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-field">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-field">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Min. 8 characters" required>
        </div>
      </div>

      <button type="submit" class="btn-submit">Create Student Account</button>
      
      <p class="switch-auth">Hiring talent? <a href="register-client.html">Signup as Client</a></p>
    </form>
  </div>
</div>

<footer class="footer-mini">© 2026 Skill Linkr | Blue Edition</footer>
</body>
</html>
