<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Signup | Skill Linkr</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="auth-nav">
  <div class="logo"><h2><span>Skill</span> Linkr</h2></div>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Home</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon-circle" style="background: rgba(14, 165, 233, 0.1); color: #0ea5e9;">
        <i class="fas fa-briefcase"></i>
      </div>
      <h2>Client Registration</h2>
      <p>Post jobs and hire the best students.</p>
    </div>

    <form>
      <div class="input-group">
        <label>Full Name / HR Name</label>
        <div class="input-field">
          <i class="fas fa-user-tie"></i>
          <input type="text" placeholder="Who is hiring?" required>
        </div>
      </div>

      <div class="input-group">
        <label>Company Name</label>
        <div class="input-field">
          <i class="fas fa-building"></i>
          <input type="text" placeholder="Your Startup or Business">
        </div>
      </div>

      <div class="input-group">
        <label>Work Email</label>
        <div class="input-field">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="hr@company.com" required>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-field">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-submit">Create Client Account</button>
      
      <p class="switch-auth">Looking for work? <a href="register-student.html">Signup as Student</a></p>
    </form>
  </div>
</div>

<footer class="footer-mini">© 2026 Skill Linkr | Blue Edition</footer>
</body>
</html>
