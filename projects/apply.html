<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply for Project - Skill Linkr</title>
  <link rel="stylesheet" href="../css/style.css">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <h2>Skill Linkr</h2>
  <a href="../index.html" class="nav-btn">Home</a>
</nav>

<section class="container">

  <h2 data-aos="fade-up">Apply for Project</h2>

  <!-- Project Preview -->
  <div class="card project-preview" data-aos="fade-up">
    <h3>Website Redesign for Startup</h3>
    <p>
      Looking for a frontend developer to redesign our landing page 
      with modern UI and responsive layout.
    </p>
    <p><strong>Budget:</strong> ₹5,000 – ₹8,000</p>
    <p><strong>Deadline:</strong> 7 Days</p>
  </div>

  <!-- Application Form -->
  <div class="card" data-aos="zoom-in">

    <form>

      <label>Your Proposal</label>
      <textarea placeholder="Explain why you're the best fit for this project..." required></textarea>

      <div class="form-row">
        <div>
          <label>Your Bid (₹)</label>
          <input type="number" placeholder="Enter amount" required>
        </div>

        <div>
          <label>Delivery Time (Days)</label>
          <input type="number" placeholder="Enter days" required>
        </div>
      </div>

      <div class="form-group">
        <label>Attach Sample Work (Optional)</label>
        <input type="file">
      </div>

      <div class="form-group terms">
        <label>
          <input type="checkbox" required>
          I agree to complete the project responsibly.
        </label>
      </div>

      <button class="btn full-btn">Submit Application 🚀</button>

    </form>

  </div>

</section>

<!-- Footer -->
<footer>
  © 2026 Skill Linkr | Connecting Skills with Opportunities
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
  duration: 800,
  once: true
});
</script>

</body>
</html>
