<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Skill Linkr</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Font Awesome (Icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">

<!-- Navbar Minimal -->
<nav class="navbar">
  <h2>Skill Linkr</h2>
  <a href="index.html" class="nav-btn">Home</a>
</nav>

<!-- Login Section -->
<section class="auth-container">

  <div class="auth-card" data-aos="zoom-in">

    <h2>Welcome Back 👋</h2>
    <p class="auth-subtitle">Login to continue your freelancing journey</p>

    <form class="form" onsubmit="handleLogin(event)">

      <div class="input-group">
        <i class="fa fa-envelope"></i>
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
        <i class="fa fa-eye toggle-password" onclick="togglePassword()"></i>
      </div>

      <div class="form-options">
        <label>
          <input type="checkbox"> Remember Me
        </label>
        <a href="#">Forgot Password?</a>
      </div>

      <button class="btn full-btn">Login</button>

      <p class="redirect-text">
        Don’t have an account?
        <a href="register.html">Register Now</a>
      </p>

    </form>

  </div>

</section>

<!-- Footer -->
<footer>
  © 2026 Skill Linkr | Connecting Skills with Opportunities
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
  duration: 800,
  once: true
});

function togglePassword() {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
}
</script>

<script src="js/main.js"></script>

</body>
</html>
