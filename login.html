<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Skill Linkr - Welcome Back</title>
  <link rel="stylesheet" href="auth.css">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="auth-nav">
  <div class="logo"><h2><span>Skill</span> Linkr</h2></div>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Home</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card" data-aos="zoom-in">
    <div class="auth-header">
      <div class="icon-circle"><i class="fas fa-fingerprint"></i></div>
      <h2>Welcome Back 👋</h2>
      <p>Login to access your dashboard and projects.</p>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>I am a...</label>
        <div class="input-field">
          <i class="fas fa-user-tag"></i>
          <select id="userRole" required style="width: 100%; border: none; background: transparent; outline: none; padding: 14px 0; font-family: inherit; cursor: pointer;">
            <option value="" disabled selected>Select Role</option>
            <option value="student">Student / Freelancer</option>
            <option value="client">Client / Recruiter</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-field">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="name@example.com" required>
        </div>
      </div>

      <div class="input-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label>Password</label>
            <a href="#" style="font-size: 0.8rem; color: var(--primary); text-decoration: none; font-weight: 600; margin-bottom: 6px;">Forgot?</a>
        </div>
        <div class="input-field">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPass" placeholder="••••••••" required>
          <i class="fas fa-eye" style="cursor: pointer; margin-right: 0;" onclick="togglePassword('loginPass')"></i>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem;">
        <input type="checkbox" id="remember" style="width: 16px; height: 16px; cursor: pointer;">
        <label for="remember" style="font-size: 0.9rem; color: var(--grey); cursor: pointer; margin-bottom: 0;">Remember Me</label>
      </div>

      <button type="submit" class="btn-submit">Sign In to Account</button>
      
      <p class="switch-auth">New to Skill Linkr? <br>
        <a href="register-student.html">Join as Student</a> or <a href="register-client.html">Join as Client</a>
      </p>
    </form>
  </div>
</div>

<footer class="footer-mini">
    © 2026 Skill Linkr | Secure Login Portal
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="auth.js"></script>
<script>
  AOS.init({ duration: 800, once: true });
</script>

</body>
</html>
